<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ABC System - Bot Camera</title>
  <!-- Google Fonts: Outfit & Koh Santepheap for Khmer -->
  <link href="https://fonts.googleapis.com/css2?family=Koh+Santepheap:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    :root {
      --bg-color: #0b0f19; /* Default dark page background */
      --card-bg: #131926; /* Dark card background */
      --text-color: #f8fafc;
      --text-secondary: #94a3b8;
      --primary-blue: #2563eb;
      --primary-blue-hover: #1d4ed8;
      --border-color: #1e293b;
      --radius: 16px;
    }

    /* Light Theme Settings matching the user's white app mockup */
    body {
      font-family: 'Outfit', 'Koh Santepheap', sans-serif;
      background-color: #eaecef; /* Light grey background */
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      overflow: hidden;
      margin: 0;
    }

    .app-container {
      width: 100%;
      max-width: 380px;
      background-color: #f8fafc; /* Clean light slate white card */
      border-radius: var(--radius);
      border: 1px solid #e2e8f0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .title-label {
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
    }

    .toggle-camera-btn {
      background: #ffffff;
      border: 1px solid #3b82f6;
      color: #3b82f6;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .toggle-camera-btn:hover {
      background-color: rgba(59, 130, 246, 0.05);
    }

    /* Camera display frame matches user mockup */
    .camera-frame {
      background-color: #f1f5f9;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .camera-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background-color: #000000;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror view for front camera */
    }

    video.back-camera {
      transform: scaleX(1); /* Normal view for back camera */
    }

    #photo-preview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 2;
      border-radius: 8px;
    }

    /* Blue buttons matching user mockup */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .btn-blue {
      background-color: #2563eb;
      color: #ffffff;
    }

    .btn-blue:hover {
      background-color: #1d4ed8;
    }

    .btn-submit {
      background-color: #cbd5e1;
      color: #94a3b8;
      cursor: not-allowed;
    }

    .btn-submit.active {
      background-color: #2563eb;
      color: #ffffff;
      cursor: pointer;
    }

    .btn-submit.active:hover {
      background-color: #1d4ed8;
    }

    /* Loading and Overlay States */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.95);
      z-index: 99;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status-msg {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      text-align: center;
      padding: 0 24px;
    }

    .success-checkmark {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background-color: rgba(16, 185, 129, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #10b981;
      font-size: 36px;
      animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleUp {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header-row">
      <div class="title-label" id="title-text">
        រូបភាព Check In
      </div>
      <button class="toggle-camera-btn" id="btn-toggle-camera">Use Back Camera</button>
    </div>

    <div class="camera-frame">
      <div class="camera-viewport">
        <video id="video" autoplay playsinline></video>
        <img id="photo-preview" alt="Selfie Preview">
      </div>
    </div>

    <!-- Use Phone Camera Instead Link -->
    <div style="text-align: center; margin: -4px 0 4px 0;">
      <a href="#" onclick="window.triggerNativeCamera(); return false;" style="font-size: 13px; color: #2563eb; text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; gap: 4px;">
        📸 ប្រើកាមេរ៉ាទូរស័ព្ទជំនួសវិញ (Use Phone Camera)
      </a>
    </div>

    <!-- Take Photo Action -->
    <button class="btn btn-blue" id="btn-capture">
      Take Photo
    </button>

    <!-- Save & Confirm Attendance -->
    <button class="btn btn-submit" id="btn-submit" disabled>
      Check In Now
    </button>
  </div>

  <!-- Native Camera Fallback Input -->
  <input type="file" id="native-camera-input" accept="image/*" capture="user" style="display: none;">

  <!-- Fullscreen Loading/Success Overlay -->
  <div class="overlay" id="overlay">
    <div class="spinner" id="overlay-spinner"></div>
    <div class="success-checkmark" id="overlay-success" style="display: none;">✓</div>
    <div class="status-msg" id="overlay-msg">Starting camera...</div>
  </div>

  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // Parse URL queries
    const urlParams = new URLSearchParams(window.location.search);
    const employeeId = urlParams.get('employeeId') || '';
    const chatId = urlParams.get('chatId') || '';
    const action = urlParams.get('action') || 'checkin'; // checkin or checkout

    // UI Elements
    const titleText = document.getElementById('title-text');
    const toggleCameraBtn = document.getElementById('btn-toggle-camera');
    const video = document.getElementById('video');
    const photoPreview = document.getElementById('photo-preview');
    const captureBtn = document.getElementById('btn-capture');
    const submitBtn = document.getElementById('btn-submit');
    const overlay = document.getElementById('overlay');
    const overlaySpinner = document.getElementById('overlay-spinner');
    const overlaySuccess = document.getElementById('overlay-success');
    const overlayMsg = document.getElementById('overlay-msg');

    // Camera State
    let currentStream = null;
    let useFacingMode = "user"; // "user" = front, "environment" = back
    let capturedBase64 = null;

    // Set title and button text based on action
    if (action === 'checkout') {
      titleText.innerHTML = "រូបភាព Check Out";
      submitBtn.innerHTML = "Check Out Now";
    } else {
      titleText.innerHTML = "រូបភាព Check In";
      submitBtn.innerHTML = "Check In Now";
    }

    // Start video stream
    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }

      showLoading("Starting camera...");

      const constraints = {
        video: {
          facingMode: useFacingMode,
          width: { ideal: 640 },
          height: { ideal: 480 }
        },
        audio: false
      };

      try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        
        // Mirror class toggle
        if (useFacingMode === "user") {
          video.classList.remove('back-camera');
        } else {
          video.classList.add('back-camera');
        }

        hideLoading();
      } catch (err) {
        console.error("Camera access error:", err);
        showError("Unable to access camera! Please make sure Telegram has camera permissions enabled in your phone settings.", true);
      }
    }

    // Toggle camera front/back
    toggleCameraBtn.addEventListener('click', () => {
      useFacingMode = useFacingMode === "user" ? "environment" : "user";
      toggleCameraBtn.innerText = useFacingMode === "user" ? "Use Back Camera" : "Use Front Camera";
      
      // Reset capture state
      photoPreview.style.display = 'none';
      video.style.display = 'block';
      capturedBase64 = null;
      submitBtn.disabled = true;
      submitBtn.classList.remove('active');
      captureBtn.innerHTML = "Take Photo";

      startCamera();
    });

    // Capture photo from video stream
    captureBtn.addEventListener('click', () => {
      if (!currentStream) {
        window.triggerNativeCamera();
        return;
      }
      if (capturedBase64) {
        // Reset to live camera view
        photoPreview.style.display = 'none';
        video.style.display = 'block';
        capturedBase64 = null;
        submitBtn.disabled = true;
        submitBtn.classList.remove('active');
        captureBtn.innerHTML = "Take Photo";
      } else {
        // Capture photo
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        
        if (useFacingMode === "user") {
          // Mirror rendering for front camera
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
        }
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        capturedBase64 = canvas.toDataURL('image/jpeg', 0.85);

        // Show photo preview
        photoPreview.src = capturedBase64;
        photoPreview.style.display = 'block';
        video.style.display = 'none';
        
        captureBtn.innerHTML = "Retake";
        submitBtn.disabled = false;
        submitBtn.classList.add('active');
      }
    });

    // Submit attendance data
    submitBtn.addEventListener('click', async () => {
      if (!capturedBase64 || !employeeId || !chatId) return;

      showLoading("Submitting attendance...");

      const payload = {
        webAppPhoto: true,
        employeeId: employeeId,
        chatId: chatId,
        action: action,
        base64Image: capturedBase64
      };

      try {
        const response = await fetch('/api/bot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          showSuccess("Success!");
          setTimeout(() => {
            if (tg) {
              tg.close();
            } else {
              window.close();
            }
          }, 1200);
        } else {
          showError("Submission failed. Please try again.");
        }
      } catch (err) {
        console.error("Submit error:", err);
        showError("Connection failed. Please check your internet connection.");
      }
    });

    // Helpers for Loading Overlay
    function showLoading(msg) {
      overlay.style.display = 'flex';
      overlaySpinner.style.display = 'block';
      overlaySuccess.style.display = 'none';
      
      let extraHtml = '';
      if (msg === "Starting camera...") {
        extraHtml = `
          <br><br>
          <button class="btn" style="width:auto; margin:10px auto 0; padding:10px 20px; font-size:13px; background:#10b981; color:white; font-weight:700;" onclick="window.triggerNativeCamera()">
            📸 Open Native Camera (ប្រើកាមេរ៉ាទូរស័ព្ទ)
          </button>
        `;
      }
      overlayMsg.innerHTML = msg + extraHtml;
    }

    function hideLoading() {
      overlay.style.display = 'none';
    }

    function showSuccess(msg) {
      overlay.style.display = 'flex';
      overlaySpinner.style.display = 'none';
      overlaySuccess.style.display = 'flex';
      overlayMsg.innerText = msg;
    }

    function showError(msg, isCameraError = false) {
      overlay.style.display = 'flex';
      overlaySpinner.style.display = 'none';
      overlaySuccess.style.display = 'none';

      let buttonHtml = `<button class="btn btn-blue" style="width:auto; margin:0 auto; padding:8px 16px;" onclick="hideLoading()">OK</button>`;
      if (isCameraError) {
        buttonHtml = `
          <button class="btn" style="width:auto; margin:8px auto; padding:10px 20px; font-size:14px; background:#10b981; color:white; font-weight:700;" onclick="window.triggerNativeCamera()">
            📸 Open Native Camera (បើកកាមេរ៉ាទូរស័ព្ទ)
          </button>
          <button class="btn" style="width:auto; margin:8px auto; padding:8px 16px; font-size:13px; background:transparent; border:1px solid #cbd5e1; color:#64748b;" onclick="hideLoading()">
            Cancel
          </button>
        `;
      }

      overlayMsg.innerHTML = `
        <span style="color:#ef4444; font-size:32px;">⚠️</span><br><br>
        ${msg}<br><br>
        ${buttonHtml}
      `;
    }

    // Native Camera Fallback Logic
    const nativeCameraInput = document.getElementById('native-camera-input');
    
    window.triggerNativeCamera = function() {
      if (nativeCameraInput) {
        nativeCameraInput.click();
      }
    };

    if (nativeCameraInput) {
      nativeCameraInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          showLoading("Processing photo...");
          const reader = new FileReader();
          reader.onload = function(evt) {
            capturedBase64 = evt.target.result;
            
            // Show photo preview
            photoPreview.src = capturedBase64;
            photoPreview.style.display = 'block';
            video.style.display = 'none';
            
            captureBtn.innerHTML = "Retake";
            submitBtn.disabled = false;
            submitBtn.classList.add('active');
            hideLoading();
          };
          reader.onerror = function() {
            showError("Failed to read photo file.");
          };
          reader.readAsDataURL(file);
        }
      });
    }

    // Start camera on page load
    window.addEventListener('load', startCamera);
  </script>
</body>
</html>
